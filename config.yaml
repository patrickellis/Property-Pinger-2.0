# URLs from Rightmove searches. The pipeline will scrape these pages for listings.
search_urls:
  - "https://www.rightmove.co.uk/property-to-rent/find.html?propertyTypes=detached%2Csemi-detached%2Cterraced&maxBedrooms=5&keywords=character%2Cperiod%2Cvictorian&sortType=18&minPrice=3000&areaSizeUnit=sqft&channel=RENT&index=0&locationIdentifier=OUTCODE%5E2516&transactionType=LETTING&displayLocationIdentifier=SW3&radius=1.0"
  - "https://www.rightmove.co.uk/property-to-rent/map.html?keywords=edwardian%2Cgeorgian%2Ccharacter&sortType=18&areaSizeUnit=sqft&viewType=MAP&channel=RENT&index=0&locationIdentifier=REGION%5E87490&numberOfPropertiesPerPage=95&transactionType=LETTING&displayLocationIdentifier=undefined&propertyTypes=detached%2Csemi-detached%2Cterraced%2Cflat%2Cbungalow%2Cland%2Cpark-home%2Cprivate-halls&furnishTypes=furnished%2CpartFurnished%2Cunfurnished&radius=1.0"

# Maximum number of pages to paginate through per search URL.
max_search_pages: 5

# Minimum final match score out of 100 required to send a Telegram alert.
alert_threshold: 70

dealbreakers:
  # Maximum monthly rent in GBP. Properties above this are instantly rejected.
  max_price_pcm: 12000
  # Minimum number of bedrooms.
  min_bedrooms: 1
  # Minimum total size in square feet (0 to disable).
  min_total_sqft: 0
  # Acceptable furnishing states (valid options: "furnished", "part furnished", "unfurnished", "unknown").
  required_furnishing:
    - "furnished"
    - "part furnished"
    - "unfurnished"
    - "unknown"
  # Maximum floor level before a lift is strictly required.
  requires_lift_if_above_floor: 1
  # Target maximum average commute time in minutes. Commutes over this incur a penalty.
  max_commute_mins: 60

locations:
  # Primary daily commute destinations (e.g., workplaces, schools).
  hubs:
    - "South Kensington Station, London"
    - "Harley Street, London"
    - "Grosvenor Square, London"
    - "Regent's Park, London"
    - "Hyde Park, London"
  # Secondary frequent destinations (e.g., gyms, social venues).
  venues:
    - "Climbing Gym Sen, London"
    - "Royal College of Music, London"
  # Mode of transport for Google Maps API (valid options: "driving", "walking", "bicycling", "transit").
  transit_mode: "transit"

weights:
  # Positive score additions (bonuses) for desirable traits.
  price: 15
  commute: 15
  total_size: 10
  bedroom_size: 0
  natural_light: 20
  period_features: 15
  sash_windows: 5
  garden: 10
  high_ceilings: 15

penalties:
  # Negative score deductions for undesirable traits.
  ugly_exterior: -15
  small_reception: -20
  not_ground_floor_reception: -15
  virtual_staging: -15
  wide_angle_distortion: -10
  poor_epc_rating: -30
  noisy_location: -20
